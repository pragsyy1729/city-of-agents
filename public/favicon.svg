<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="32" height="32" fill="#1a1a2e"/>

  <!-- Left building -->
  <rect x="2" y="14" width="8" height="18" fill="#2d3561"/>
  <rect x="3" y="17" width="2" height="2" fill="#4ecca3"/>
  <rect x="7" y="17" width="2" height="2" fill="#4ecca3"/>
  <rect x="3" y="22" width="2" height="2" fill="#4ecca3"/>
  <rect x="7" y="22" width="2" height="2" fill="#4ecca3"/>
  <rect x="3" y="27" width="2" height="2" fill="#2a2d4a"/>
  <rect x="7" y="27" width="2" height="2" fill="#4ecca3"/>
  <!-- Left roof antenna -->
  <rect x="5" y="10" width="2" height="4" fill="#4ecca3"/>
  <rect x="4" y="12" width="4" height="2" fill="#2d3561"/>

  <!-- Center tall building -->
  <rect x="12" y="6" width="8" height="26" fill="#16213e"/>
  <rect x="13" y="9"  width="2" height="2" fill="#4ecca3"/>
  <rect x="17" y="9"  width="2" height="2" fill="#4ecca3"/>
  <rect x="13" y="14" width="2" height="2" fill="#4ecca3"/>
  <rect x="17" y="14" width="2" height="2" fill="#ffd93d"/>
  <rect x="13" y="19" width="2" height="2" fill="#ffd93d"/>
  <rect x="17" y="19" width="2" height="2" fill="#4ecca3"/>
  <rect x="13" y="24" width="2" height="2" fill="#4ecca3"/>
  <rect x="17" y="24" width="2" height="2" fill="#4ecca3"/>
  <!-- Center spire -->
  <rect x="15" y="2" width="2" height="4" fill="#4ecca3"/>

  <!-- Right building -->
  <rect x="22" y="18" width="8" height="14" fill="#2d3561"/>
  <rect x="23" y="21" width="2" height="2" fill="#ffd93d"/>
  <rect x="27" y="21" width="2" height="2" fill="#4ecca3"/>
  <rect x="23" y="26" width="2" height="2" fill="#4ecca3"/>
  <rect x="27" y="26" width="2" height="2" fill="#2a2d4a"/>

  <!-- Ground / road -->
  <rect x="0" y="30" width="32" height="2" fill="#3c3f44"/>
</svg>
